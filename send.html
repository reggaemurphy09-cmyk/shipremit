<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Remit - Send Money</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#e9eef5;
    padding-top:70px;
    padding-bottom:70px;
}

.header{
    position:fixed;
    top:0;
    width:100%;
    background:linear-gradient(#0a2c63,#1e4f9a);
    color:white;
    padding:18px;
    font-size:22px;
    font-weight:bold;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-left:20px;
    padding-right:20px;
}

.header-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.header-right{
    display:flex;
    gap:15px;
}

.header-right span{
    cursor:pointer;
    font-size:20px;
    transition:0.3s;
}

.header-right span:hover{
    transform:scale(1.1);
}

.card{
    margin:15px;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
    margin-bottom:15px;
    color:#0a2c63;
    border-left:4px solid #ff6a00;
    padding-left:10px;
}

.currentBalance{
    background:linear-gradient(135deg, #1e4f9a, #0a2c63);
    color:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    text-align:center;
}

.currentBalance .label{
    font-size:12px;
    opacity:0.9;
    margin-bottom:5px;
}

.currentBalance .amount{
    font-size:32px;
    font-weight:bold;
}

.currentBalance .converted{
    font-size:12px;
    opacity:0.8;
    margin-top:5px;
}

.infoBox{
    background:#e8f4fd;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:#0a2c63;
}

.infoBox .icon{
    font-size:20px;
}

.formSection{
    margin-bottom:25px;
    padding-bottom:15px;
    border-bottom:1px solid #eee;
}

.formSection h3{
    color:#0a2c63;
    font-size:16px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    gap:8px;
}

.formRow{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:15px;
    margin-bottom:15px;
}

.inputGroup{
    margin-bottom:15px;
}

.inputGroup label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
    font-size:13px;
}

.inputGroup label .required{
    color:#e74c3c;
}

.inputGroup input,
.inputGroup select,
.inputGroup textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:2px solid #e0e0e0;
    font-size:14px;
    transition:0.3s;
}

.inputGroup input:focus,
.inputGroup select:focus,
.inputGroup textarea:focus{
    border-color:#1e4f9a;
    outline:none;
}

.inputGroup textarea{
    resize:vertical;
    min-height:80px;
}

.sendBtn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:18px;
    color:white;
    background:linear-gradient(135deg, #2f67c2, #0a2c63);
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
    margin-top:10px;
}

.sendBtn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.sendBtn:active{
    transform:translateY(0);
}

.sendBtn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.alert{
    padding:12px;
    border-radius:8px;
    margin-bottom:15px;
    display:none;
}

.alert-error{
    background:#f8d7da;
    color:#721c24;
    border-left:4px solid #e74c3c;
}

.alert-success{
    background:#d4edda;
    color:#155724;
    border-left:4px solid #27ae60;
}

.alert-info{
    background:#d1ecf1;
    color:#0c5460;
    border-left:4px solid #17a2b8;
}

.recentContacts{
    margin-top:20px;
    padding-top:15px;
    border-top:1px solid #eee;
}

.recentContacts h3{
    font-size:14px;
    color:gray;
    margin-bottom:10px;
}

.contactChip{
    display:inline-block;
    background:#f0f0f0;
    padding:6px 14px;
    border-radius:20px;
    margin:5px;
    font-size:12px;
    cursor:pointer;
    transition:0.3s;
}

.contactChip:hover{
    background:#1e4f9a;
    color:white;
    transform:scale(1.05);
}

/* Bottom Nav */
.bottomNav{
    position:fixed;
    bottom:0;
    width:100%;
    background:linear-gradient(#1e4f9a,#0a2c63);
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    transition:0.3s;
    z-index:999;
}

.bottomNav.hide{
    bottom:-70px;
}

.bottomNav a{
    color:white;
    text-decoration:none;
    text-align:center;
    font-size:14px;
    transition:0.3s;
    flex:1;
}

.bottomNav a:hover{
    transform:translateY(-3px);
}

.bottomNav div{
    font-size:20px;
}

@media (max-width: 600px){
    .formRow{
        grid-template-columns:1fr;
        gap:0;
    }
    
    .currentBalance .amount{
        font-size:24px;
    }
    
    .infoBox{
        font-size:11px;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <span>💰</span>
        <span>Send Money</span>
    </div>
    <div class="header-right">
        <span onclick="window.location.href='history.html'">📜</span>
        <span onclick="window.location.href='profile.html'">👤</span>
    </div>
</div>

<div class="card">
    <div class="currentBalance">
        <div class="label">Available Balance</div>
        <div class="amount" id="balanceAmount">$0.00</div>
        <div class="converted" id="convertedBalance">≈ ₱ 0.00 PHP</div>
    </div>
    
    <div class="infoBox">
        <div class="icon">⏳</div>
        <div>Transactions will be <strong>PENDING</strong> until approved by admin. You can edit or cancel pending transactions in History.</div>
    </div>
    
    <div id="alert" class="alert"></div>
    
    <!-- Recipient Information Section -->
    <div class="formSection">
        <h3>👤 Recipient Information</h3>
        <div class="formRow">
            <div class="inputGroup">
                <label>First Name <span class="required">*</span></label>
                <input type="text" id="firstName" placeholder="Enter first name">
            </div>
            <div class="inputGroup">
                <label>Last Name <span class="required">*</span></label>
                <input type="text" id="lastName" placeholder="Enter last name">
            </div>
        </div>
        
        <div class="inputGroup">
            <label>Full Name (Display Name) <span class="required">*</span></label>
            <input type="text" id="fullName" placeholder="Full name as it appears on account">
        </div>
        
        <div class="inputGroup">
            <label>Account Number <span class="required">*</span></label>
            <input type="text" id="accountNumber" placeholder="Enter recipient account number">
        </div>
        
        <div class="formRow">
            <div class="inputGroup">
                <label>Bank/Provider Name <span class="required">*</span></label>
                <select id="bankName">
                    <option value="">Select Bank/Provider</option>
                    <option value="BPI">BPI - Bank of the Philippine Islands</option>
                    <option value="BDO">BDO - Banco de Oro</option>
                    <option value="Metrobank">Metrobank</option>
                    <option value="GCash">GCash</option>
                    <option value="PayMaya">PayMaya</option>
                    <option value="UnionBank">UnionBank</option>
                    <option value="Security Bank">Security Bank</option>
                    <option value="Chinabank">Chinabank</option>
                    <option value="PNB">PNB - Philippine National Bank</option>
                    <option value="EastWest">EastWest Bank</option>
                </select>
            </div>
            <div class="inputGroup">
                <label>Account Type</label>
                <select id="accountType">
                    <option value="Savings">Savings Account</option>
                    <option value="Checking">Checking Account</option>
                    <option value="E-Wallet">E-Wallet</option>
                    <option value="Cash Pickup">Cash Pickup</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Address Information Section -->
    <div class="formSection">
        <h3>📍 Address Information</h3>
        <div class="inputGroup">
            <label>Street Address <span class="required">*</span></label>
            <input type="text" id="streetAddress" placeholder="House number and street name">
        </div>
        
        <div class="formRow">
            <div class="inputGroup">
                <label>City <span class="required">*</span></label>
                <input type="text" id="city" placeholder="City">
            </div>
            <div class="inputGroup">
                <label>Province/State</label>
                <input type="text" id="province" placeholder="Province or State">
            </div>
        </div>
        
        <div class="formRow">
            <div class="inputGroup">
                <label>Postal Code</label>
                <input type="text" id="postalCode" placeholder="Postal code">
            </div>
            <div class="inputGroup">
                <label>Country <span class="required">*</span></label>
                <select id="country">
                    <option value="Philippines">Philippines</option>
                    <option value="United States">United States</option>
                    <option value="Canada">Canada</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="Australia">Australia</option>
                    <option value="Singapore">Singapore</option>
                    <option value="Japan">Japan</option>
                    <option value="South Korea">South Korea</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Transfer Details Section -->
    <div class="formSection">
        <h3>💸 Transfer Details</h3>
        <div class="inputGroup">
            <label>Amount (USD) <span class="required">*</span></label>
            <input type="number" id="amount" placeholder="Enter amount" step="0.01" min="0.01">
        </div>
        
        <div class="formRow">
            <div class="inputGroup">
                <label>Payment Method <span class="required">*</span></label>
                <select id="paymentMethod">
                    <option value="Bank Transfer">🏦 Bank Transfer</option>
                    <option value="GCash">📱 GCash</option>
                    <option value="PayMaya">📱 PayMaya</option>
                    <option value="Cash Pickup">💰 Cash Pickup</option>
                    <option value="PayPal">🌐 PayPal</option>
                    <option value="Remittance Center">🏢 Remittance Center</option>
                </select>
            </div>
            <div class="inputGroup">
                <label>Transfer Purpose</label>
                <select id="purpose">
                    <option value="Family Support">Family Support</option>
                    <option value="Bill Payment">Bill Payment</option>
                    <option value="Business">Business Payment</option>
                    <option value="Gift">Gift</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        
        <div class="inputGroup">
            <label>Reference / Note</label>
            <textarea id="note" placeholder="Optional note or reference (max 100 characters)" maxlength="100"></textarea>
        </div>
    </div>
    
    <button class="sendBtn" onclick="sendMoney()">
        🚀 Send Money Now
    </button>
    
    <div class="recentContacts">
        <h3>📞 Recent Recipients</h3>
        <div id="recentContacts"></div>
    </div>
</div>

<div class="bottomNav" id="bottomNav">
    <a href="home.html"><div>🏠</div>Home</a>
    <a href="send.html"><div>💳</div>Send</a>
    <a href="history.html"><div>📜</div>History</a>
    <a href="profile.html"><div>👤</div>Profile</a>
</div>

<script>
// Update balance display
function updateBalance() {
    let balance = localStorage.getItem('userBalance') || '1000';
    let currency = localStorage.getItem('userCurrency') || 'USD';
    let symbol = getCurrencySymbol(currency);
    document.getElementById('balanceAmount').textContent = `${symbol}${parseFloat(balance).toFixed(2)}`;
    
    // Update converted balance
    let rate = parseFloat(localStorage.getItem('exchangeRate') || '56.50');
    let convertedBalance = parseFloat(balance) * rate;
    document.getElementById('convertedBalance').innerHTML = `≈ ₱ ${convertedBalance.toFixed(2)} PHP`;
}

// Get currency symbol
function getCurrencySymbol(currency) {
    const symbols = {
        USD: '$',
        EUR: '€',
        GBP: '£',
        PHP: '₱',
        JPY: '¥'
    };
    return symbols[currency] || '$';
}

// Show alert message
function showAlert(message, type) {
    let alertDiv = document.getElementById('alert');
    alertDiv.textContent = message;
    alertDiv.className = `alert alert-${type}`;
    alertDiv.style.display = 'block';
    
    setTimeout(() => {
        alertDiv.style.display = 'none';
    }, 4000);
}

// Auto-fill full name from first and last name
function updateFullName() {
    let firstName = document.getElementById('firstName').value.trim();
    let lastName = document.getElementById('lastName').value.trim();
    if(firstName || lastName) {
        document.getElementById('fullName').value = `${firstName} ${lastName}`.trim();
    }
}

// Add event listeners for auto-full name
document.getElementById('firstName').addEventListener('input', updateFullName);
document.getElementById('lastName').addEventListener('input', updateFullName);

// Get recent contacts
function getRecentContacts() {
    let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
    let contacts = [];
    
    transactions.forEach(t => {
        if(t.recipientDetails) {
            let contactName = t.recipientDetails.fullName || t.receiver;
            if(!contacts.includes(contactName)) {
                contacts.push(contactName);
            }
        } else if(t.receiver) {
            if(!contacts.includes(t.receiver)) {
                contacts.push(t.receiver);
            }
        }
    });
    
    return contacts.slice(-5);
}

// Display recent contacts
function displayRecentContacts() {
    let contacts = getRecentContacts();
    let container = document.getElementById('recentContacts');
    
    if(contacts.length === 0) {
        container.innerHTML = '<span style="color:gray; font-size:12px;">No recent recipients</span>';
        return;
    }
    
    container.innerHTML = contacts.map(contact => 
        `<span class="contactChip" onclick="fillRecipient('${contact.replace(/'/g, "\\'")}')">${contact}</span>`
    ).join('');
}

// Fill recipient details from recent contact
function fillRecipient(name) {
    // This would need to store full recipient details
    // For now, just set the full name
    document.getElementById('fullName').value = name;
    
    // Try to split into first and last name
    let nameParts = name.split(' ');
    if(nameParts.length >= 2) {
        document.getElementById('firstName').value = nameParts[0];
        document.getElementById('lastName').value = nameParts.slice(1).join(' ');
    } else {
        document.getElementById('firstName').value = name;
    }
    
    showAlert(`Recipient "${name}" loaded. Please verify other details.`, 'info');
}

// Send money function
function sendMoney() {
    // Get recipient details
    let firstName = document.getElementById('firstName').value.trim();
    let lastName = document.getElementById('lastName').value.trim();
    let fullName = document.getElementById('fullName').value.trim();
    let accountNumber = document.getElementById('accountNumber').value.trim();
    let bankName = document.getElementById('bankName').value;
    let accountType = document.getElementById('accountType').value;
    
    // Get address details
    let streetAddress = document.getElementById('streetAddress').value.trim();
    let city = document.getElementById('city').value.trim();
    let province = document.getElementById('province').value.trim();
    let postalCode = document.getElementById('postalCode').value.trim();
    let country = document.getElementById('country').value;
    
    // Get transfer details
    let amount = parseFloat(document.getElementById('amount').value);
    let paymentMethod = document.getElementById('paymentMethod').value;
    let purpose = document.getElementById('purpose').value;
    let note = document.getElementById('note').value.trim();
    
    // Validation
    let errors = [];
    
    if(!firstName) errors.push('First Name is required');
    if(!lastName) errors.push('Last Name is required');
    if(!fullName) errors.push('Full Name is required');
    if(!accountNumber) errors.push('Account Number is required');
    if(!bankName) errors.push('Bank/Provider is required');
    if(!streetAddress) errors.push('Street Address is required');
    if(!city) errors.push('City is required');
    if(!country) errors.push('Country is required');
    if(!amount || isNaN(amount) || amount <= 0) errors.push('Please enter a valid amount');
    if(amount < 1) errors.push('Minimum amount is $1.00');
    
    if(errors.length > 0) {
        showAlert(errors.join('\n'), 'error');
        return;
    }
    
    let balance = parseFloat(localStorage.getItem('userBalance') || '0');
    
    if(amount > balance) {
        showAlert(`Insufficient balance! Your current balance is $${balance.toFixed(2)}`, 'error');
        return;
    }
    
    // Build full address
    let fullAddress = `${streetAddress}, ${city}${province ? ', ' + province : ''}${postalCode ? ' ' + postalCode : ''}, ${country}`;
    
    // Build recipient display name
    let displayReceiver = `${fullName} (${bankName})`;
    
    // Confirm transaction with details
    let confirmMessage = `💰 TRANSACTION DETAILS:\n\n` +
        `Recipient: ${fullName}\n` +
        `Account: ${accountNumber} (${bankName} - ${accountType})\n` +
        `Address: ${fullAddress}\n` +
        `Amount: $${amount.toFixed(2)}\n` +
        `Method: ${paymentMethod}\n` +
        `Purpose: ${purpose}\n\n` +
        `⏳ This transaction will be PENDING until admin approval.\n` +
        `✏️ You can edit or cancel it while pending.\n\n` +
        `Confirm to send?`;
    
    if(confirm(confirmMessage)) {
        // Deduct balance immediately
        let newBalance = balance - amount;
        localStorage.setItem('userBalance', newBalance);
        
        // Get user info
        let userEmail = localStorage.getItem('userEmail') || 'user@email.com';
        let userName = localStorage.getItem('userName') || 'User';
        
        // Create recipient details object
        let recipientDetails = {
            firstName: firstName,
            lastName: lastName,
            fullName: fullName,
            accountNumber: accountNumber,
            bankName: bankName,
            accountType: accountType,
            streetAddress: streetAddress,
            city: city,
            province: province,
            postalCode: postalCode,
            country: country,
            fullAddress: fullAddress
        };
        
        // Create transaction object with PENDING status
        let transaction = {
            id: Date.now(),
            userId: 1,
            userEmail: userEmail,
            userName: userName,
            receiver: displayReceiver,
            recipientDetails: recipientDetails,
            amount: amount,
            method: paymentMethod,
            purpose: purpose,
            note: note,
            date: new Date().toLocaleString(),
            timestamp: new Date().getTime(),
            status: 'pending'
        };
        
        // Save to user's transactions
        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
        transactions.unshift(transaction);
        localStorage.setItem('transactions', JSON.stringify(transactions));
        
        // Save to admin's all transactions
        let allTransactions = JSON.parse(localStorage.getItem('allTransactions') || '[]');
        allTransactions.push(transaction);
        localStorage.setItem('allTransactions', JSON.stringify(allTransactions));
        
        // Update user's balance in users list
        let allUsers = JSON.parse(localStorage.getItem('allUsers') || '[]');
        let userIndex = allUsers.findIndex(u => u.email === userEmail);
        if(userIndex !== -1) {
            allUsers[userIndex].balance = newBalance;
            localStorage.setItem('allUsers', JSON.stringify(allUsers));
        }
        
        // Show success message
        showAlert(`✅ Transaction created!\n\n$${amount.toFixed(2)} sent to ${fullName}\nAccount: ${accountNumber}\n\n⏳ Status: PENDING Admin Approval\n✏️ You can edit or cancel this transaction in History.`, 'success');
        
        // Clear form (keep some fields for convenience)
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('fullName').value = '';
        document.getElementById('accountNumber').value = '';
        document.getElementById('streetAddress').value = '';
        document.getElementById('city').value = '';
        document.getElementById('province').value = '';
        document.getElementById('postalCode').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
        
        // Reset to default selections
        document.getElementById('bankName').value = '';
        document.getElementById('accountType').value = 'Savings';
        document.getElementById('paymentMethod').value = 'Bank Transfer';
        document.getElementById('purpose').value = 'Family Support';
        document.getElementById('country').value = 'Philippines';
        
        // Update balance display
        updateBalance();
        
        // Update recent contacts
        displayRecentContacts();
        
        // Redirect to history after 3 seconds
        setTimeout(() => {
            if(confirm('View transaction history?')) {
                window.location.href = 'history.html';
            }
        }, 3000);
    }
}

// Bottom Nav Scroll
let lastScroll = 0;
let bottomNav = document.getElementById("bottomNav");

window.addEventListener("scroll", function(){
    let currentScroll = window.pageYOffset;
    if(currentScroll <= 0){
        bottomNav.classList.remove("hide");
        return;
    }
    if(currentScroll > lastScroll){
        bottomNav.classList.add("hide");
    }else{
        bottomNav.classList.remove("hide");
    }
    lastScroll = currentScroll;
});

// Check login
if(!localStorage.getItem('isLoggedIn')) {
    window.location.href = 'login.html';
}

// Initialize
updateBalance();
displayRecentContacts();

// Add Enter key support for amount
document.getElementById('amount').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') {
        sendMoney();
    }
});
</script>
</body>
</html>
