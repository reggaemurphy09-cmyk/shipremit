<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Remit - Upload Receipt</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#e9eef5;
    padding-top:70px;
    padding-bottom:70px;
}

.header{
    position:fixed;
    top:0;
    width:100%;
    background:linear-gradient(#0a2c63,#1e4f9a);
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    z-index:1000;
}

.card{
    margin:15px;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.uploadArea{
    border:2px dashed #ccc;
    border-radius:15px;
    padding:40px;
    margin:20px 0;
    cursor:pointer;
    transition:0.3s;
}

.uploadArea:hover{
    border-color:#1e4f9a;
    background:#f8f9fa;
}

.uploadIcon{
    font-size:48px;
    margin-bottom:10px;
}

.fileInput{
    display:none;
}

.preview{
    max-width:100%;
    margin:20px 0;
    border-radius:10px;
    display:none;
}

.uploadBtn{
    width:100%;
    padding:15px;
    background:linear-gradient(#ff9c2f,#ff6a00);
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

.bottomNav{
    position:fixed;
    bottom:0;
    width:100%;
    background:linear-gradient(#1e4f9a,#0a2c63);
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.bottomNav a{
    color:white;
    text-decoration:none;
    text-align:center;
    font-size:14px;
}

.bottomNav div{
    font-size:20px;
}
</style>
</head>

<body>
<div class="header">
📷 Upload Receipt
</div>

<div class="card">
    <h2>Upload Payment Receipt</h2>
    
    <div class="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="uploadIcon">📸</div>
        <div>Click to upload or drag & drop</div>
        <div style="font-size:12px; margin-top:10px;">PNG, JPG up to 5MB</div>
    </div>
    
    <input type="file" id="fileInput" class="fileInput" accept="image/*" onchange="previewImage(this)">
    
    <img id="preview" class="preview">
    
    <button class="uploadBtn" onclick="uploadReceipt()">Upload Receipt</button>
</div>

<div class="bottomNav">
    <a href="home.html"><div>🏠</div>Home</a>
    <a href="send.html"><div>💳</div>Send</a>
    <a href="history.html"><div>📜</div>History</a>
    <a href="profile.html"><div>👤</div>Profile</a>
</div>

<script>
function previewImage(input) {
    let preview = document.getElementById('preview');
    if(input.files && input.files[0]) {
        let reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function uploadReceipt() {
    let file = document.getElementById('fileInput').files[0];
    if(file) {
        alert('Receipt uploaded successfully!');
        document.getElementById('fileInput').value = '';
        document.getElementById('preview').style.display = 'none';
    } else {
        alert('Please select a file first');
    }
}
</script>
</body>
</html>
