<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Remit - Setup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(#0a2c63, #1e4f9a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .setup-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        button {
            background: linear-gradient(#1e4f9a, #0a2c63);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }
        input {
            padding: 10px;
            margin: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 200px;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="setup-card">
        <h2>🚢 Ship Remit Setup</h2>
        <p>Initialize Firebase Database</p>
        
        <div>
            <label>USD to PHP Rate:</label>
            <input type="number" id="rate" step="0.01" value="56.50">
        </div>
        
        <button onclick="setupExchangeRate()">Set Exchange Rate</button>
        <button onclick="setupAdminUser()">Create Admin User</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function setupExchangeRate() {
            const rate = parseFloat(document.getElementById('rate').value);
            const resultDiv = document.getElementById('result');
            
            try {
                await db.collection('settings').doc('exchangeRate').set({
                    rate: rate,
                    lastUpdate: new Date().toISOString()
                });
                resultDiv.innerHTML = '<p class="success">✅ Exchange rate set successfully!</p>';
            } catch(error) {
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }
        
        async function setupAdminUser() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>⚠️ Create admin user in Firebase Console → Authentication</p>';
        }
    </script>
</body>
</html>
