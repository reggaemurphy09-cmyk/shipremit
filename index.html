<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Remit - Loading...</title>
<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(135deg, #0a2c63, #1e4f9a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Arial, sans-serif;
}

.loading{
    text-align:center;
    color:white;
}

.spinner{
    width:50px;
    height:50px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>
<body>
<div class="loading">
    <div style="font-size:48px;">🚢</div>
    <div style="font-size:24px; margin:20px;">Ship Remit</div>
    <div class="spinner"></div>
    <div>Loading...</div>
</div>

<script>
// Check login status and redirect - NO FIREBASE
setTimeout(() => {
    let isLoggedIn = localStorage.getItem('isLoggedIn');
    let isAdminLoggedIn = localStorage.getItem('isAdminLoggedIn');
    
    if(isAdminLoggedIn === 'true') {
        window.location.href = 'admin-dashboard.html';
    } else if(isLoggedIn === 'true') {
        window.location.href = 'home.html';
    } else {
        window.location.href = 'login.html';
    }
}, 1500);
</script>
</body>
</html>
